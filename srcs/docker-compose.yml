
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
  ftp_password:
    file: ../secrets/ftp_password.txt



services:
  nginx:                              ## nginx
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress


  wordpress:                ## wordpress      # https://ajelloul.42.fr/  
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
      - redis
    secrets:
      - db_password
      - credentials
    env_file:
      - .env


  mariadb:                            ## mariadb
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    restart: unless-stopped
    expose:
      - "3306"
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    secrets:
      - db_password
      - db_root_password
    env_file:
      - .env

  redis:                                  ## redis
    build: ./bonus/redis
    container_name: redis
    image: redis
    restart: unless-stopped
    expose:
      - "6379"                         
    networks:
      - inception
    
  adminer:                       ## adminer   http://localhost:8888
    build: ./bonus/adminer
    container_name: adminer
    image: adminer
    restart: unless-stopped
    ports:
      - "8888:8888"             
    networks:
      - inception
    depends_on:
      - mariadb


  ftp:                                   ## ftp
    build: ./bonus/ftp
    container_name: ftp
    image: ftp
    restart: unless-stopped
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    env_file:
      - .env
    secrets:
      - ftp_password



  dozzle:                       ## dozzle     http://localhost:9090
    build: ./bonus/dozzle
    container_name: dozzle
    image: dozzle
    restart: unless-stopped
    ports:
      - "9090:8080" 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - inception

  website:                                  ## website  http://localhost:8081
    build: ./bonus/website
    container_name: website
    image: website
    restart: unless-stopped
    ports:
      - "8081:8081"  



networks:
  inception:
    driver: bridge


# Bind-mount: Docker maps the volume directly to a folder on the host.
# type: none  → no special filesystem driver
# o:      bind     → standard Linux bind-mount
# device      → the absolute path on the host machine

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /home/${USER}/data/mariadb

  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /home/${USER}/data/wordpress
