version: '3.8'

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
  ftp_password:
    file: ../secrets/ftp_password.txt



services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
      - redis
    secrets:
      - db_password
      - credentials
    environment:
      DOMAIN_NAME:      ${DOMAIN_NAME}
      MYSQL_DATABASE:   ${MYSQL_DATABASE}
      MYSQL_USER:       ${MYSQL_USER}
      WP_ADMIN_USER:    ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL:   ${WP_ADMIN_EMAIL}
      WP_USER:          ${WP_USER}
      WP_USER_EMAIL:    ${WP_USER_EMAIL}

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    expose:
      - "3306"
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception
    secrets:
      - db_password
      - db_root_password
    environment:
      MYSQL_DATABASE:           ${MYSQL_DATABASE}
      MYSQL_USER:               ${MYSQL_USER}
      MYSQL_PASSWORD_FILE:      /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    
  redis:
    build: ./bonus/redis
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"                         
    networks:
      - inception
    
  adminer:
    build: ./bonus/adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8888:8888"                     # http://localhost:8888
    networks:
      - inception
    depends_on:
      - mariadb


  ftp:
    build: ./bonus/ftp
    container_name: ftp
    restart: unless-stopped
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    environment:
      - FTP_USER=${FTP_USER}
      - FTP_PASSWORD_FILE=/run/secrets/ftp_password
    secrets:
      - ftp_password



  website:
    build: ./bonus/website
    container_name: website
    ports:
      - "8081:80"    # http://localhost:8081


networks:
  inception:
    driver: bridge


# Bind-mount: Docker maps the volume directly to a folder on the host.
# type: none  → no special filesystem driver
# o: bind     → standard Linux bind-mount
# device      → the absolute path on the host machine

volumes:
  db:
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /home/${USER}/data/mariadb

  wordpress:
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /home/${USER}/data/wordpress

